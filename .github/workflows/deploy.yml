name: Validate Azure deployment definitions

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install Node dependencies
        run: |
          npm ci
          (cd frontend && npm ci)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - name: Install locked Python environments
        run: |
          uv sync --locked
          (cd session-container && uv sync --locked)
      - name: Run deterministic host verification
        run: npm run verify:ci
      - name: Build Bicep
        uses: azure/cli@v2
        with:
          inlineScript: |
            az bicep install
            az bicep build --file infra/foundation.bicep
            az bicep build --file infra/apps.bicep
      - name: Check deploy script syntax
        run: bash -n infra/deploy.sh
