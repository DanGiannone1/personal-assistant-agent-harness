name: Validate Azure deployment definitions

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install focused test runner
        run: python -m pip install pytest
      - name: Run Entra and infrastructure contracts
        run: python -m pytest -q tests/test_infra_entra_contract.py
      - name: Build Bicep
        uses: azure/cli@v2
        with:
          inlineScript: |
            az bicep install
            az bicep build --file infra/foundation.bicep
            az bicep build --file infra/apps.bicep
