# Local development only. Production uses Azure Container Apps Dynamic Sessions
# (isolated per-user session pools) instead of a shared container.
# See infra/deploy.sh for the production deployment.
services:
  session-container:
    build:
      context: .
      dockerfile: session-container/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - AZURE_ENDPOINT
      - AZURE_DEPLOYMENT
      - AZURE_OPENAI_TOKEN
      - IDENTITY_MODE
      - WORKSPACE=/workspace
    volumes:
      - ./workspace:/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - POOL_MANAGEMENT_ENDPOINT=http://session-container:8080
      - FRONTEND_URL
      - IDENTITY_MODE
      - DEMO_PASSWORD
      - ENTRA_TENANT_ID
      - ENTRA_API_CLIENT_ID
      - ENTRA_ALLOWED_AUDIENCES
    depends_on:
      session-container:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_IDENTITY_MODE: ${NEXT_PUBLIC_IDENTITY_MODE:-demo}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
