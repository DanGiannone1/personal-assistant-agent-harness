id: WAZA-MP-4-update-does-not-trigger
name: Direct status update does not trigger
description: A direct mutation must remain an ordinary product operation.
tags: [gate, routing, negative]
inputs:
  prompt: Set Product Launch to Yellow with the exact reason 'Pricing approval slipped'.
expected:
  behavior:
    max_tool_calls: 5
graders:
  - type: skill_invocation
    name: forbids_meeting_prep
    config:
      forbidden_skills: [engagement-meeting-prep]
  - type: tool_constraint
    name: exact_status_operation
    config:
      expect_tools:
        - { tool: ".*set_engagement_status$" }
      reject_tools:
        - { tool: ".*(create_engagement|update_engagement|share_engagement|navigate)$" }
